<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Te lo llevo V2 - Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><a href="index.html"><h1>Te lo llevo 🏍️</h1></a></div>
        <nav class="nav-menu">
            <a href="pedidos.html">Pedidos</a>
            <a href="clientes.html" class="active">Clientes</a>
            <a href="empleados.html">Empleados</a>
        </nav>
    </header>
    <main class="dashboard-container">
        <h2 class="page-title">Clientes</h2>
        <div class="content-layout">
            <div class="form-container"><div class="form-card">
                <h3>Registrar Cliente</h3>
                <form id="clienteForm">
                    <div class="form-group"><label>Nombre Completo</label><input type="text" id="clienteNombre" class="form-control" required></div>
                    <button type="submit" class="btn-primary">Guardar</button>
                </form>
            </div></div>
            <div class="table-container"><div class="table-card">
                <table class="data-table"><thead><tr><th>ID</th><th>Nombre</th></tr></thead><tbody id="tableBody"></tbody></table>
            </div></div>
        </div>
    </main>
    <script type="module">
        import { db, collection, addDoc, getDocs, query, where } from "./firebase-config.js";
        const form = document.getElementById('clienteForm');
        const tbody = document.getElementById('tableBody');

        async function cargar() {
            tbody.innerHTML = '';
            const q = query(collection(db, "clientes"), where("activo", "==", true));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `<tr><td><strong>${data.id_auto}</strong></td><td>${data.nombre}</td></tr>`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "clientes"), {
                id_auto: 'CLI-' + Math.floor(100000 + Math.random() * 900000),
                nombre: document.getElementById('clienteNombre').value.trim(),
                activo: true
            });
            form.reset(); cargar();
        });
        document.addEventListener('DOMContentLoaded', cargar);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Te lo llevo V2 - Control de Cuentas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><a href="index.html"><h1>Te lo llevo 🏍️</h1></a></div>
        <nav class="nav-menu">
            <a href="index.html">Panel</a>
            <a href="pedidos.html">Pedidos</a>
            <a href="cuentas.html" class="active">Cuentas</a>
        </nav>
    </header>
    <main class="dashboard-container">
        <h2 class="page-title">Estados de Cuentas por Clientes (Semana Activa)</h2>
        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID Cliente</th>
                        <th>Nombre Comercial / Personal</th>
                        <th>Pedidos Totales</th>
                        <th>Pendientes</th>
                        <th>Entregados</th>
                        <th>Total Acumulado (RD$)</th>
                    </tr>
                </thead>
                <tbody id="cuentasBody"></tbody>
            </table>
        </div>
    </main>
    <script type="module">
        import { db, collection, getDocs, query, where } from "./firebase-config.js";

        async function cargarCuentas() {
            const cliSnap = await getDocs(query(collection(db, "clientes"), where("activo", "==", true)));
            const pedSnap = await getDocs(query(collection(db, "pedidos"), where("valido", "==", true)));
            
            const mapaCli = {};
            cliSnap.forEach(c => {
                mapaCli[c.data().id_auto] = { nombre: c.data().nombre, totales: 0, pendientes: 0, entregados: 0, dinero: 0 };
            });

            pedSnap.forEach(p => {
                const d = p.data();
                if(mapaCli[d.id_cliente]) {
                    mapaCli[d.id_cliente].totales += 1;
                    if(d.estatus === "Pendiente") mapaCli[d.id_cliente].pendientes += 1;
                    if(d.estatus === "Entregado") {
                        mapaCli[d.id_cliente].entregados += 1;
                        mapaCli[d.id_cliente].dinero += parseFloat(d.precio || 0);
                    }
                }
            });

            const tbody = document.getElementById('cuentasBody');
            tbody.innerHTML = '';
            for(let key in mapaCli) {
                const c = mapaCli[key];
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${key}</strong></td>
                        <td>${c.nombre}</td>
                        <td>${c.totales}</td>
                        <td><span class="badge badge-pendiente">${c.pendientes}</span></td>
                        <td><span class="badge badge-entregado">${c.entregados}</span></td>
                        <td><strong>RD$ ${c.dinero.toFixed(2)}</strong></td>
                    </tr>
                `;
            }
        }
        document.addEventListener('DOMContentLoaded', cargarCuentas);
    </script>
</body>
</html>

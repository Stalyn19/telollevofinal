<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Te lo llevo V2 - Historial de Reportes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" alt="Te lo llevo Logo" class="logo-img">
                <span class="logo-text">Te lo llevo</span>
            </a>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Panel Principal</a>
            <a href="reportes.html" class="active">Reportes Históricos</a>
        </nav>
    </header>

    <main class="dashboard-container" id="mainContent">
        <h2 class="page-title">Historial Semanal de Reportes Consolidados</h2>
        <div id="reportesContainer">
            <p style="text-align:center; color:var(--text-muted);">No se han realizado cortes de semana todavía.</p>
        </div>
    </main>

    <div id="clienteModal" class="modal">
        <div class="modal-content" style="max-width: 650px; text-align: left;">
            <h3 id="modalClienteNombre" style="color: #1e3c72;"></h3>
            <p id="modalClientePeriodo" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.2rem;"></p>
            
            <div style="max-height: 320px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px;">
                <table class="data-table" style="margin-top: 0;">
                    <thead>
                        <tr>
                            <th>Fecha y Hora</th>
                            <th>Mercancía / Detalle</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="modalClienteTablaBody"></tbody>
                </table>
            </div>
            
            <div style="margin-top: 1.2rem; text-align: right; font-size: 1.15rem;">
                <strong>Total Acumulado: <span id="modalClienteTotal" style="color: var(--success-green);"></span></strong>
            </div>
            <button id="btnCerrarClienteModal" class="btn-primary" style="margin-top: 1.5rem; background: #64748b;">Cerrar Ventana</button>
        </div>
    </div>

    <div id="ticketPrintArea" class="ticket-print-hidden"></div>

    <script type="module">
        import { auth, onAuthStateChanged } from "./firebase-config.js";
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
    </script>

    <script type="module">
        import { db, collection, getDocs } from "./firebase-config.js";

        // Mapeo en memoria para almacenar las órdenes de los cortes sin sobrecargar la red
        let baseDatosCortesMemory = {};

        async function cargarReportes() {
            const container = document.getElementById('reportesContainer');
            const snap = await getDocs(collection(db, "cortes_semanales"));
            
            if(snap.empty) return;
            container.innerHTML = '';

            snap.forEach(docSnap => {
                const corte = docSnap.data();
                const block = document.createElement('div');
                block.className = 'report-block';

                // Guardar pedidos en el mapa indexado por el ID del documento
                baseDatosCortesMemory[docSnap.id] = corte.pedidos;

                const empData = {};
                const cliData = {};

                corte.pedidos.forEach(p => {
                    if(!empData[p.id_empleado]) {
                        empData[p.id_empleado] = { nombre: p.nombre_empleado || p.id_empleado, viajes: 0, bruto: 0 };
                    }
                    empData[p.id_empleado].viajes += 1;
                    empData[p.id_empleado].bruto += parseFloat(p.precio || 0);

                    if(!cliData[p.id_cliente]) {
                        cliData[p.id_cliente] = { nombre: p.nombre_cliente || p.id_cliente, viajes: 0, acumulado: 0 };
                    }
                    cliData[p.id_cliente].viajes += 1;
                    cliData[p.id_cliente].acumulado += parseFloat(p.precio || 0);
                });

                const estampadoTiempo = corte.fecha_corte || "Fecha no especificada";

                let htmlContent = `
                    <div class="report-header-title">
                        📋 Nómina - Período: Semanal del ${corte.periodo}
                        <br><span style="font-size:0.85rem; font-weight:normal; opacity:0.85;">Procesado el: ${estampadoTiempo}</span>
                    </div>
                    
                    <h4>🛵 Resumen de Liquidación a Mensajeros</h4>
                    <table class="data-table" style="margin-bottom:1.5rem;">
                        <thead>
                            <tr>
                                <th>Mensajero</th>
                                <th>Viajes</th>
                                <th>Sueldo Bruto</th>
                                <th>Descuento (RD$50xV)</th>
                                <th>Sueldo Neto</th>
                                <th>Factura</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                for(let k in empData) {
                    const e = empData[k];
                    const descuento = e.viajes * 50;
                    const neto = e.bruto - descuento;
                    
                    const tktData = { 
                        periodo: corte.periodo, 
                        id: k, 
                        nombre: e.nombre, 
                        viajes: e.viajes, 
                        bruto: e.bruto.toFixed(2), 
                        descuento: descuento.toFixed(2), 
                        neto: neto.toFixed(2),
                        procesado: estampadoTiempo
                    };

                    htmlContent += `
                        <tr>
                            <td><strong>${e.nombre}</strong></td>
                            <td>${e.viajes} envíos</td>
                            <td>RD$ ${e.bruto.toFixed(2)}</td>
                            <td style="color:var(--accent-red);">- RD$ ${descuento.toFixed(2)}</td>
                            <td style="color:var(--success-green); font-weight:bold;">RD$ ${neto.toFixed(2)}</td>
                            <td><button class="action-btn btn-print" data-ticket='${JSON.stringify(tktData)}'>🖨️ Ticket 55mm</button></td>
                        </tr>
                    `;
                }

                // NUEVO: Modificación de la tabla para enlazar el evento clic en el nombre del cliente
                htmlContent += `</tbody></table><h4>👥 Resumen de Facturación Clientes (Haz clic en un cliente para ver detalles)</h4><table class="data-table"><thead><tr><th>Cliente</th><th>Viajes Recibidos</th><th>Balance Acumulado</th></tr></thead><tbody>`;

                for(let c in cliData) {
                    const cl = cliData[c];
                    htmlContent += `
                        <tr>
                            <td>
                                <span class="link-cliente-detalle" data-corte-id="${docSnap.id}" data-cliente-id="${c}" data-cliente-nombre="${cl.nombre}" data-periodo="${corte.periodo}" style="cursor:pointer; color:#1e3c72; text-decoration:underline; font-weight:600;">
                                    ${cl.nombre}
                                </span>
                            </td>
                            <td>${cl.viajes} envíos</td>
                            <td><strong>RD$ ${cl.acumulado.toFixed(2)}</strong></td>
                        </tr>
                    `;
                }

                htmlContent += `</tbody></table>`;
                block.innerHTML = htmlContent;
                container.appendChild(block);
            });

            // ACTIVACIÓN DE LOS ENLACES DE CLIENTES (VENTANA EMERGENTE)
            document.querySelectorAll('.link-cliente-detalle').forEach(link => {
                link.addEventListener('click', (e) => {
                    const corteId = e.currentTarget.getAttribute('data-corte-id');
                    const clienteId = e.currentTarget.getAttribute('data-cliente-id');
                    const clienteNombre = e.currentTarget.getAttribute('data-cliente-nombre');
                    const periodo = e.currentTarget.getAttribute('data-periodo');

                    // Filtrar los pedidos guardados correspondientes a este cliente y corte
                    const todosLosPedidosDelCorte = baseDatosCortesMemory[corteId] || [];
                    const pedidosFiltrados = todosLosPedidosDelCorte.filter(p => p.id_cliente === clienteId);

                    // Poblar textos del Modal
                    document.getElementById('modalClienteNombre').textContent = `📄 Reporte de Envíos: ${clienteNombre}`;
                    document.getElementById('modalClientePeriodo').textContent = `Corte correspondiente al período: ${periodo}`;
                    
                    const modalBody = document.getElementById('modalClienteTablaBody');
                    modalBody.innerHTML = '';
                    let cuentaTotal = 0;

                    pedidosFiltrados.forEach(p => {
                        cuentaTotal += parseFloat(p.precio || 0);
                        const fechaMostrar = p.fecha_hora_pedido || "Sin registro de hora";
                        
                        modalBody.innerHTML += `
                            <tr>
                                <td>${fechaMostrar}</td>
                                <td><strong>${p.detalle_pedido}</strong></td>
                                <td style="color:var(--text-dark); font-weight:600;">RD$ ${parseFloat(p.precio).toFixed(2)}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('modalClienteTotal').textContent = `RD$ ${cuentaTotal.toFixed(2)}`;
                    
                    // Mostrar la ventana emergente
                    document.getElementById('clienteModal').style.display = 'flex';
                });
            });

            // Lógica de impresión del Ticket Térmico de 55mm
            document.querySelectorAll('.btn-print').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const t = JSON.parse(e.target.getAttribute('data-ticket'));
                    const printArea = document.getElementById('ticketPrintArea');
                    
                    printArea.className = "ticket-print-area";
                    printArea.innerHTML = `
------------------------
      TE LO LLEVO V2    
   Servicio de Motores  
------------------------
PERIODO: 
${t.periodo}
------------------------
MENSAJERO:
${t.nombre} (${t.id})
------------------------
VIAJES REALIZADOS: ${t.viajes}
------------------------
SUELDO BRUTO:
RD$ ${t.bruto}

DESCUENTO OPERATIVO:
-RD$ ${t.descuento} (RD$50xV)
------------------------
SUELDO NETO A PAGAR:
RD$ ${t.neto}
------------------------
Firma Conforme:


________________________
PROCESADO:
${t.procesado}
------------------------
¡Eficiencia sobre ruedas!
------------------------
                    `;
                    window.print();
                    printArea.className = "ticket-print-hidden";
                    printArea.innerHTML = "";
                });
            });
        }

        // Lógica para cerrar la ventana emergente
        const clModal = document.getElementById('clienteModal');
        document.getElementById('btnCerrarClienteModal').addEventListener('click', () => clModal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === clModal) clModal.style.display = 'none'; });

        document.addEventListener('DOMContentLoaded', cargarReportes);
    </script>
</body>
</html>

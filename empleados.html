<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Te lo llevo V2 - Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
               <div class="logo">
    <a href="index.html">
        <img src="logo.png" alt="Te lo llevo Logo" class="logo-img">
        <span class="logo-text">Te lo llevo</span>
    </a>
</div>
        <nav class="nav-menu">
            <a href="pedidos.html">Pedidos</a>
            <a href="clientes.html">Clientes</a>
            <a href="empleados.html" class="active">Empleados</a>
        </nav>
    </header>
    <main class="dashboard-container">
        <h2 class="page-title">Flotilla de Empleados</h2>
        <div class="content-layout">
            <div class="form-container"><div class="form-card">
                <h3>Registrar Empleado</h3>
                <form id="empForm">
                    <div class="form-group"><label>Nombre</label><input type="text" id="empNombre" class="form-control" required></div>
                    <div class="form-group"><label>Apellido</label><input type="text" id="empApellido" class="form-control" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="text" id="empTelefono" class="form-control" required></div>
                    <div class="form-group"><label>Cédula</label><input type="text" id="empCedula" class="form-control" required></div>
                    <button type="submit" class="btn-primary">Guardar Empleado</button>
                </form>
            </div></div>
            <div class="table-container"><div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre Completo</th>
                            <th>Teléfono</th>
                            <th>Cédula</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div></div>
        </div>
    </main>
    <script type="module">
        import { db, collection, addDoc, getDocs, query, where, updateDoc, doc } from "./firebase-config.js";
        const form = document.getElementById('empForm');
        const tbody = document.getElementById('tableBody');

        async function cargar() {
            tbody.innerHTML = '';
            const snap = await getDocs(query(collection(db, "empleados"), where("activo", "==", true)));
            
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${data.id_auto}</strong></td>
                    <td>${data.nombre} ${data.apellido}</td>
                    <td>${data.telefono}</td>
                    <td>${data.cedula}</td>
                    <td>
                        <button class="action-btn btn-delete btn-borrar-emp" data-id="${docSnap.id}">Borrar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Asignar evento de borrado lógico
            document.querySelectorAll('.btn-borrar-emp').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm("¿Seguro que desea dar de baja a este empleado? Su historial y nóminas guardadas no sufrirán cambios.")) {
                        const docId = e.target.getAttribute('data-id');
                        await updateDoc(doc(db, "empleados", docId), { activo: false });
                        cargar(); // Recargar tabla
                    }
                });
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "empleados"), {
                id_auto: 'EMP-' + Math.floor(100000 + Math.random() * 900000),
                nombre: document.getElementById('empNombre').value.trim(),
                apellido: document.getElementById('empApellido').value.trim(),
                telefono: document.getElementById('empTelefono').value.trim(),
                cedula: document.getElementById('empCedula').value.trim(),
                activo: true
            });
            form.reset(); 
            cargar();
        });
        document.addEventListener('DOMContentLoaded', cargar);
    </script>
</body>
</html>

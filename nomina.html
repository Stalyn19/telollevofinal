<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Te lo llevo V2 - Nómina en Tiempo Real</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
               <div class="logo">
    <a href="index.html">
        <img src="logo.png" alt="Te lo llevo Logo" class="logo-img">
        <span class="logo-text">Te lo llevo</span>
    </a>
</div>
        <nav class="nav-menu">
            <a href="index.html">Panel</a>
            <a href="pedidos.html">Pedidos</a>
            <a href="nomina.html" class="active">Nómina</a>
        </nav>
    </header>
    <main class="dashboard-container">
        <h2 class="page-title">Acumulado de Nómina Semanal en Tiempo Real</h2>
        <p style="color:var(--text-muted); margin-bottom:1.5rem;">Cálculo operativo: Descuento fijo de RD$ 50.00 por cada viaje completado.</p>
        
        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Código Empleado</th>
                        <th>Nombre Completo</th>
                        <th>Viajes Realizados</th>
                        <th>Sueldo Bruto (RD$)</th>
                        <th>Descuento (RD$ 50 x Viaje)</th>
                        <th>Sueldo Neto a Pagar (RD$)</th>
                    </tr>
                </thead>
                <tbody id="nominaBody">
                    <tr><td colspan="6" style="text-align:center;">Calculando acumulados...</td></tr>
                </tbody>
            </table>
        </div>
    </main>



    <script type="module">
        import { db, collection, getDocs, query, where } from "./firebase-config.js";

        async function calcularNominaRealTime() {
            const empSnap = await getDocs(query(collection(db, "empleados"), where("activo", "==", true)));
            const pedSnap = await getDocs(query(collection(db, "pedidos"), where("valido", "==", true), where("estatus", "==", "Entregado")));
            
            const mapaEmp = {};
            empSnap.forEach(e => {
                const data = e.data();
                mapaEmp[data.id_auto] = { nombre: data.nombre, apellido: data.apellido, viajes: 0, bruto: 0 };
            });

            pedSnap.forEach(p => {
                const data = p.data();
                if(mapaEmp[data.id_empleado]) {
                    mapaEmp[data.id_empleado].viajes += 1;
                    mapaEmp[data.id_empleado].bruto += parseFloat(data.precio || 0);
                }
            });

            const tbody = document.getElementById('nominaBody');
            tbody.innerHTML = '';
            
            for(let key in mapaEmp) {
                const emp = mapaEmp[key];
                
                // APLICACIÓN DE TU NUEVA REGLA MATEMÁTICA
                const descuentoTotal = emp.viajes * 50; 
                const sueldoNeto = emp.bruto - descuentoTotal;

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${key}</strong></td>
                        <td>${emp.nombre} ${emp.apellido}</td>
                        <td><span class="badge badge-entregado">${emp.viajes} viajes</span></td>
                        <td>RD$ ${emp.bruto.toFixed(2)}</td>
                        <td style="color:var(--accent-red); font-weight:600;">- RD$ ${descuentoTotal.toFixed(2)}</td>
                        <td style="color:var(--success-green); font-weight:bold; font-size:1.05rem;">RD$ ${sueldoNeto.toFixed(2)}</td>
                    </tr>
                `;
            }
            if(Object.keys(mapaEmp).length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay empleados registrados activos.</td></tr>';
            }
        }
        document.addEventListener('DOMContentLoaded', calcularNominaRealTime);
    </script>
</body>
</html>
